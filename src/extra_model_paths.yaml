runpod_worker_comfy:
  base_path: /runpod-volume
  checkpoints: models/checkpoints/
  clip: models/clip/
  clip_vision: models/clip_vision/
  configs: models/configs/
  controlnet: models/controlnet/
  embeddings: models/embeddings/
  loras: models/loras/
  upscale_models: models/upscale_models/
  vae: models/vae/
  unet: models/unet/
  # ADetailer / Impact-Pack YOLO detectors
  ultralytics_bbox: models/ultralytics/bbox/
  ultralytics_segm: models/ultralytics/segm/
  ultralytics: models/ultralytics/
  sams: models/sams/
  # Wan 2.2 video model files live alongside standard ComfyUI paths:
  #   diffusion_models  — Wan 2.2 I2V transformer weights (e.g. wan2.2_i2v_720p_fp8.safetensors)
  #   text_encoders     — umt5-xxl text encoder (Wan uses UMT5, not standard CLIP)
  #   vae               — Wan VAE (wan_2.1_vae.safetensors)
  # Note: ComfyUI natively searches models/diffusion_models/ if declared.
  diffusion_models: models/diffusion_models/
  text_encoders: models/text_encoders/
